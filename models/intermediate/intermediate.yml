version: 2

models:
  - name: int_portfolio_value
    description: Calculates the market value of each client fund holding by multiplying units with fund NAV.

    columns:
      - name: client_id
        tests:
          - not_null

      - name: fund_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_fund')
                field: fund_id

      - name: market_value
        tests:
          - not_null


  - name: int_client_aum
    description: Aggregates total assets under management for each client based on portfolio market value.

    columns:
      - name: client_id
        tests:
          - unique
          - not_null

      - name: total_aum
        tests:
          - not_null


  - name: int_fee_tier_assignment
    description: Assigns each client to the applicable fee tier based on total assets under management.

    columns:
      - name: client_id
        tests:
          - unique
          - not_null

      - name: tier
        tests:
          - not_null

      - name: bps
        tests:
          - not_null